query SearchCollections($query: String!, $page: Int!, $size: Int!) {
  searchCollections(query: $query, page: $page, size: $size) {
    id
    name
    price
    externalLink
    slug
    author {
      username
    }
    galleryImages { 
      filePath 
    }
  }
}

mutation CreateCollection($input: CreateNewCollectionInput!) {
  createCollection(input: $input) {
    id
    name
    success
  }
}

mutation DeleteCollection($id: ID!, $folderPath: String) {
  deleteCollection(id: $id, folderPath: $folderPath)
}

mutation UpdateCollection($id: ID!, $input: UpdateCollectionRequest!) {
  updateCollection(id: $id, input: $input) {
    id
    name
    price
    description
    externalLink
    galleryImages {
      filePath
    }
  }
}

query GetCollectionsPaged($page: Int!, $size: Int!) {
  getAllCollections(page: $page, size: $size) {
    id
    name
    description
    price
    externalLink
    author {
      username
      totalSales
    }
    galleryImages {
      filePath
    }
  }
}

query GetCollectionBySlug($username: String!, $slug: String!) {
  getCollectionBySlug(username: $username, slug: $slug) {
    id
    name
    description
    price
    videoTutorialUrl
    externalLink
    slug
    likesCount
    isLiked
    author {
        id,
        userId,
        bio,
        rating,
        totalSales,
        socialLinks {
            platform
            url
        },
        username,
        email,
        avatarUrl
    }
    galleryImages {
      fileName
      filePath
    }
    mediaResource {
      id
      fileName
      fileSize
      mimeType
      provider
    }
  }
}

query GetLikedCollections {
  getLikedCollections {
    id
    name
    description
    price
    externalLink
    author {
      username
    }
    galleryImages {
      filePath
    }
    likesCount
    isLiked
  }
}

query GetCollectionsByTag($input: CollectionFilterInput!) {
  getCollectionsByTag(input: $input) {
    collections {
      id
      name
      description
      price
      slug
      author {
        username
      }
      galleryImages {
        filePath
      }
    }
    totalPages
    totalElements
  }
}

