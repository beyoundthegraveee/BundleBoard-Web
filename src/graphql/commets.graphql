query GetCommentsByCollectionId($collectionId: ID!) {
  getCommentsByCollectionId(collectionId: $collectionId) {
    id
    content
    createdAt
    user {
      id
      username
      avatarUrl
    }
  }
}

query GetCommentsByUserId($userId: ID!) {
  getCommentsByUserId(userId: $userId) {
    id
    content
    createdAt
    collection {
      id
      name
      slug
      author {
        username
      }
    }
  }
}

mutation AddComment($input: AddCommentRequest!) {
  addComment(input: $input) {
    success
    message
    comment {
      id
      content
      createdAt
      user {
        id
        username
        avatarUrl
      }
    }
  }
}



mutation DeleteComment($id: ID!) {
  deleteComment(id: $id)
}