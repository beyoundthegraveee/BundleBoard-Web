mutation UpdateUserRole($input: UpdateUserRoleInput!) {
  updateUserRole(input: $input) { 
    success 
    message
    accessToken
    refreshToken
  }
}

mutation UpdateAvatar($input: UpdateAvatarRequest!) {
  updateAvatar(input: $input) {
    id
    avatarUrl
  }
}

mutation UpdateMe($input: UpdateUserRequest!) {
  updateMe(input: $input) {
    id
    username
    avatarUrl
    updatedAt
    accessToken
    refreshToken
  }
}

query GetMe {
  me {
    id
    username
    email
    avatarUrl
    roles
    status
  }
}

query GetUserProfile {
  getUserProfile {
    id
    username
    email
    avatarUrl
    status
    roles
    bio
    stripeAccountId
    socialLinks {
      platform
      url
    }
    authoredCollections {
      id
      name
      price
      description
      downloadCount
      tags {
        id
        name
      }
      galleryImages { 
        filePath 
      }
    }
    purchases {
      id
      amount
      currency
      status
      createdAt
      items {
        id
        snapshotPrice
        asset {
          id
          name
          galleryImages { 
            filePath 
            fileName 
          }
        }
      }
    }
  }
}

mutation UpdateProfileDetails($bio: String, $socialLinks: [SocialLinkInput!]) {
  updateProfileDetails(bio: $bio, socialLinks: $socialLinks) {
    id
    bio
    socialLinks {
      platform
      url
    }
  }
}

input SocialLinkInput {
     platform: String!
   url: String!
}