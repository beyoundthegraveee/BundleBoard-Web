mutation RequestPasswordChange($input: PasswordChangeInput!) {
  requestPasswordChange(input: $input) {
    success
    message
    attemptsLeft
  }
}

mutation ConfirmPasswordChange($code: String!) {
  confirmPasswordChange(code: $code) {
    success
    message
    attemptsLeft
  }
}

mutation RequestPasswordReset($input: PasswordResetInput!) {
  requestPasswordReset(input: $input) {
    success
    message
    token
  }
}

mutation ConfirmPasswordReset($input: PasswordConfirmResetInput!) {
  confirmPasswordReset(input: $input) {
    success
    message
  }
}